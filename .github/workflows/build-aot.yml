name: Build AOT CLI (cross-platform)

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        type: choice
        required: true
        default: 'Release'
        options:
          - Release
          - Debug

permissions:
  contents: read

env:
  PROJECT: src/JwtDecoder/JwtDecoder.csproj

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}

    strategy:
      # Don't cancel siblings if one platform fails; we still want the others.
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            runner: windows-latest
            rid: win-x64
            exe: jwtdecode.exe
          - label: windows-arm64
            runner: windows-11-arm
            rid: win-arm64
            exe: jwtdecode.exe
          - label: linux-x64
            runner: ubuntu-latest
            rid: linux-x64
            exe: jwtdecode
          - label: linux-arm64
            runner: ubuntu-24.04-arm
            rid: linux-arm64
            exe: jwtdecode
          - label: macos-arm64
            runner: macos-latest
            rid: osx-arm64
            exe: jwtdecode

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Show .NET info
        shell: pwsh
        run: dotnet --info

      # Native AOT on Linux needs clang + zlib headers for the final native link.
      # ubuntu-latest typically already has them; install is idempotent and cheap.
      - name: Install Linux AOT dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        shell: pwsh
        run: dotnet restore "$env:PROJECT" -r ${{ matrix.rid }}

      - name: Publish (Native AOT)
        shell: pwsh
        run: >
          dotnet publish "$env:PROJECT"
          -c ${{ inputs.configuration }}
          -r ${{ matrix.rid }}
          --no-restore

      - name: Locate published binary
        id: locate
        shell: pwsh
        run: |
          $publishDir = "src/JwtDecoder/bin/${{ inputs.configuration }}/net10.0/${{ matrix.rid }}/publish"
          $bin = Join-Path $publishDir '${{ matrix.exe }}'
          if (-not (Test-Path $bin)) {
            Write-Error "Expected output not found: $bin"
            if (Test-Path $publishDir) {
              Get-ChildItem -Recurse $publishDir | Format-Table FullName, Length
            }
            exit 1
          }
          # Make sure the binary is executable on Unix runners (publish usually does
          # this already, but we set it explicitly so the smoke test never fails for
          # a permissions reason).
          if ($IsLinux -or $IsMacOS) { chmod +x $bin }
          $sizeMB = [math]::Round((Get-Item $bin).Length / 1MB, 2)
          Write-Host "Built ${{ matrix.exe }} ($sizeMB MB) for ${{ matrix.rid }}"
          "binPath=$bin" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # Every entry in the matrix runs on its own native architecture, so the
      # smoke test runs unconditionally.
      - name: Smoke test
        shell: pwsh
        run: |
          & "${{ steps.locate.outputs.binPath }}" --version
          & "${{ steps.locate.outputs.binPath }}" --help

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jwtdecode-${{ matrix.rid }}-${{ inputs.configuration }}-${{ github.sha }}
          path: ${{ steps.locate.outputs.binPath }}
          if-no-files-found: error
          retention-days: 30
