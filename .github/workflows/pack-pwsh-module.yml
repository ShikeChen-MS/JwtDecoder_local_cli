name: Package PowerShell module (local install)

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: 'Build configuration'
        type: choice
        required: true
        default: 'Release'
        options:
          - Release
          - Debug
  # Run on every push to master so a regression never sits unbuilt.
  push:
    branches:
      - master
  # Periodic refresh: runs at 06:00 UTC on the 1st and 21st of every
  # month. Worst-case gap between runs is exactly 20 days (day 1 to
  # day 21 within the same month), so the build is exercised at most
  # 20 days apart even if nothing is pushed.
  schedule:
    - cron: '0 6 1,21 * *'

permissions:
  contents: read
  # Needed by actions/attest-build-provenance to mint the Sigstore OIDC
  # token and to record the attestation in the repo's attestation log.
  id-token: write
  attestations: write

env:
  PROJECT: src/JwtDecoder.PowerShell/JwtDecoder.PowerShell.csproj
  # Push and schedule events have no workflow inputs, so fall back to
  # 'Release' for non-dispatch runs.
  CONFIGURATION: ${{ inputs.configuration || 'Release' }}

jobs:
  package:
    name: Build, self-test, and upload module zip
    # The module is pure managed code (net8.0) and works on every PowerShell
    # 7.4+ host (Windows, Linux, macOS). One Windows build runner is enough.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDKs (8 for PS module + Core, 10 for tests)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Show .NET info
        shell: pwsh
        run: dotnet --info

      # Run the full unit-test suite BEFORE any module publish or artifact
      # upload. The PS module cmdlets call straight through to JwtDecoder.Core,
      # so a Core regression must fail this job before the .psd1 is staged.
      - name: Run unit tests (dotnet test)
        shell: pwsh
        run: dotnet test -c $env:CONFIGURATION --logger "console;verbosity=normal"

      - name: Restore
        shell: pwsh
        run: dotnet restore "$env:PROJECT"

      - name: Publish module
        shell: pwsh
        run: >
          dotnet publish "$env:PROJECT"
          -c $env:CONFIGURATION
          --no-restore

      - name: Stage artifact
        id: stage
        shell: pwsh
        run: |
          $publishDir = "src/JwtDecoder.PowerShell/bin/$env:CONFIGURATION/net8.0/publish"
          if (-not (Test-Path $publishDir)) {
            throw "Publish output not found: $publishDir"
          }

          # Read the version from the freshly-built manifest so the artifact
          # name carries the actual module version.
          $manifest = Test-ModuleManifest -Path (Join-Path $publishDir 'JwtDecoder.psd1')
          $version  = $manifest.Version
          $sha7     = "${{ github.sha }}".Substring(0, 7)
          $stageName = "JwtDecoder-PowerShell-Module-$version-$sha7"
          $stageRoot = Join-Path $env:RUNNER_TEMP $stageName
          $moduleDir = Join-Path $stageRoot 'Module'

          if (Test-Path $stageRoot) { Remove-Item $stageRoot -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $moduleDir | Out-Null

          # Copy the runtime files (skip PDBs / XML docs / NuGet leftovers).
          Get-ChildItem -LiteralPath $publishDir -File |
            Where-Object { $_.Extension -notin @('.pdb', '.xml') } |
            ForEach-Object {
              Copy-Item -LiteralPath $_.FullName -Destination (Join-Path $moduleDir $_.Name) -Force
            }

          # Drop the local installer + a quick-start README at the top level
          # of the artifact so the user sees them immediately on extract.
          Copy-Item 'tools/Install-PackagedModule.ps1'        (Join-Path $stageRoot 'Install-PackagedModule.ps1') -Force
          Copy-Item 'tools/Install-PackagedModule.README.txt' (Join-Path $stageRoot 'README.txt')                 -Force

          Write-Host "Staged artifact contents:"
          Get-ChildItem -Recurse $stageRoot | Format-Table FullName, Length

          "stageRoot=$stageRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "stageName=$stageName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version"     | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # Run the installer end-to-end on the runner so we never publish an
      # artifact whose installer is broken. This exercises the same code
      # path an end-user will hit on Windows.
      - name: Self-test installer (PSEdition + version detection + install)
        shell: pwsh
        run: |
          $stageRoot = "${{ steps.stage.outputs.stageRoot }}"
          & (Join-Path $stageRoot 'Install-PackagedModule.ps1') -Scope CurrentUser -Force

          Import-Module JwtDecoder -Force
          $cmds = Get-Command -Module JwtDecoder
          if (-not $cmds) { throw "No cmdlets exported by JwtDecoder after install." }
          Write-Host "Module loaded; cmdlets: $($cmds.Name -join ', ')"

      # Sample-driven functional tests against the just-installed module.
      # Mirrors tools/Test-AotBuild.ps1 for the CLI: exercises every supported
      # algorithm family, every -Key* parameter set, time-status handling,
      # and the documented security hardening (algorithm confusion, private-
      # key refusal, JOSE curve binding, duplicate header keys, oversized
      # input, alg=none rejection). The artifact is only uploaded if every
      # case passes.
      - name: Functional tests (samples/)
        shell: pwsh
        run: ./tools/Test-JwtDecoderModule.ps1

      # Mint a Sigstore-backed build provenance attestation for the files
      # users will actually load or execute: the module DLLs, the manifest,
      # and the installer script. Anyone who downloads the artifact can
      # later run `gh attestation verify <file> --owner ShikeChen-MS` to
      # confirm each file came from this workflow, this repo, this commit.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            ${{ steps.stage.outputs.stageRoot }}/Install-PackagedModule.ps1
            ${{ steps.stage.outputs.stageRoot }}/Module/*.dll
            ${{ steps.stage.outputs.stageRoot }}/Module/*.psd1

      # actions/upload-artifact@v4 always wraps its input in a zip when the
      # user downloads the artifact, so uploading the staged DIRECTORY (not
      # a pre-built zip) avoids the zip-inside-a-zip experience.
      - name: Upload artifact zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.stage.outputs.stageName }}
          path: ${{ steps.stage.outputs.stageRoot }}/*
          if-no-files-found: error
          retention-days: 30
