name: Publish release (PSGallery + GitHub Release)

# Manual-only. Cuts a formal release by doing all of the following from a
# single approval:
#
#   1. Validate the tag and parse the version.
#   2. Build + functional-test the PowerShell module.
#   3. Build + functional-test the AOT CLI on all 5 supported platforms
#      (Native AOT, with Sigstore build-provenance attestations).
#   4. Publish the module to PowerShell Gallery (environment-gated;
#      requires manual approval; dry-run by default).
#   5. Create a GitHub Release at the tag with all 5 CLI binaries
#      attached as assets (skipped entirely on dry runs).
#
# Release procedure:
#
#   git tag v1.0.1 && git push origin v1.0.1   # OR `git tag 1.0.1` -- both
#                                                # forms accepted; the 'v' is
#                                                # stripped before publishing.
#   Actions tab -> "Publish release (PSGallery + GitHub Release)" ->
#       "Run workflow" -> switch the ref dropdown to the tag.
#   First run leaves dry_run=true; approve in the Actions UI to exercise
#   the dry-run paths end-to-end (no PSGallery upload, no GitHub Release).
#   Re-run with dry_run=false, approve again -- this is the live release.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no PSGallery upload, no GitHub Release created)'
        type: boolean
        required: true
        default: true

permissions:
  contents: read

env:
  PROJECT_MODULE: src/JwtDecoder.PowerShell/JwtDecoder.PowerShell.csproj
  PROJECT_CLI:    src/JwtDecoder/JwtDecoder.csproj

jobs:
  # ---------------------------------------------------------------------
  # Job 1: parse and validate the tag. Trivially fast; both downstream
  # build paths consume `version` so they can run in parallel.
  # ---------------------------------------------------------------------
  prep:
    name: Validate tag and parse version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}

    steps:
      - name: Reject non-tag refs
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" != "tag" ]; then
            echo "::error::This workflow must be run against a tag (e.g. v1.0.0), not '${{ github.ref }}'. In the 'Run workflow' UI, switch the 'Use workflow from' dropdown to the tag."
            exit 1
          fi
          echo "Tag: ${{ github.ref_name }}"

      - name: Parse version from tag
        id: parse
        shell: bash
        run: |
          tag='${{ github.ref_name }}'
          # Accept tags with OR without a leading 'v' (e.g. v1.0.0 or 1.0.0).
          # The PowerShell Gallery's published version is ALWAYS the bare
          # numeric form — the 'v' is for git/GitHub convention only.
          version="${tag#v}"
          version="${version#V}"

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Tag '$tag' does not look like a version. Must match MAJOR.MINOR.PATCH (optionally .REVISION), with or without a leading 'v'. Examples: v1.0.0, 1.0.0, v1.0.0.1"
            exit 1
          fi

          echo "Tag        : $tag"
          echo "Version    : $version (the bare form; no v prefix)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------
  # Job 2: build + functionally test the PowerShell module. Stages it
  # for the publish-module job. NO secrets, NO environment gate.
  # ---------------------------------------------------------------------
  validate-module:
    name: Build + test PowerShell module
    needs: prep
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        shell: pwsh
        run: dotnet restore "$env:PROJECT_MODULE"

      - name: Publish module (dotnet)
        shell: pwsh
        run: dotnet publish "$env:PROJECT_MODULE" -c Release --no-restore

      - name: Stage module + rewrite ModuleVersion to the tag's version
        shell: pwsh
        run: |
          $publishDir = "src/JwtDecoder.PowerShell/bin/Release/net8.0/publish"
          $version    = '${{ needs.prep.outputs.version }}'
          $stageRoot  = Join-Path $env:RUNNER_TEMP 'publish-stage'
          $moduleDir  = Join-Path $stageRoot 'JwtDecoder'

          if (Test-Path $stageRoot) { Remove-Item $stageRoot -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $moduleDir | Out-Null

          Get-ChildItem -LiteralPath $publishDir -File |
            Where-Object { $_.Extension -notin @('.pdb', '.xml') } |
            ForEach-Object { Copy-Item -LiteralPath $_.FullName -Destination (Join-Path $moduleDir $_.Name) -Force }

          # Targeted regex rewrite of the ModuleVersion line. Safer than
          # Update-ModuleManifest, which can reformat unrelated fields.
          # Detect "did the pattern match?" separately from "did the
          # content change?", because publishing a version that happens
          # to match the committed manifest value (e.g. tagging v1.0.0
          # while ModuleVersion is already '1.0.0') produces byte-
          # identical output and would otherwise look like a no-op.
          $manifestPath = Join-Path $moduleDir 'JwtDecoder.psd1'
          $content      = Get-Content -Raw -LiteralPath $manifestPath
          $pattern      = "(?m)^(\s*ModuleVersion\s*=\s*)'[^']+'"
          if (-not [regex]::IsMatch($content, $pattern)) {
            throw "Could not find a ModuleVersion = '...' line to rewrite in $manifestPath."
          }
          $updated = [regex]::Replace($content, $pattern, "`${1}'$version'")
          Set-Content -LiteralPath $manifestPath -Value $updated -NoNewline

          $m = Test-ModuleManifest -Path $manifestPath
          if ($m.Version -ne [Version]$version) {
            throw "Manifest version $($m.Version) does not match tag version $version after rewrite."
          }

          Write-Host "Staged JwtDecoder $version at: $moduleDir"
          Get-ChildItem $moduleDir | Format-Table Name, Length

      - name: Functional tests against the staged module
        shell: pwsh
        run: |
          $manifestPath = Join-Path $env:RUNNER_TEMP 'publish-stage' 'JwtDecoder' 'JwtDecoder.psd1'
          ./tools/Test-JwtDecoderModule.ps1 -ModulePath $manifestPath

      - name: Pre-check PSGallery — refuse to re-publish an existing version
        shell: pwsh
        run: |
          $version = '${{ needs.prep.outputs.version }}'
          $found = $null
          try {
            $found = Find-PSResource -Name JwtDecoder -Version $version -Repository PSGallery -ErrorAction SilentlyContinue 2>$null
          } catch { }
          if ($found) {
            throw "JwtDecoder $version is already published to PSGallery. Bump the tag and try again."
          }
          Write-Host "PSGallery does not yet have JwtDecoder $version. Clear to publish."

      - name: Upload staged module for the publish job
        uses: actions/upload-artifact@v4
        with:
          name: publish-stage
          path: ${{ runner.temp }}/publish-stage
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------
  # Job 3: build + functionally test the AOT CLI on every platform, name
  # each binary for release, attest its provenance, upload as an
  # artifact. Mirrors build-aot.yml but adds the release-friendly rename
  # and is keyed off the tag's version.
  # ---------------------------------------------------------------------
  build-cli:
    name: Build CLI ${{ matrix.label }}
    needs: prep
    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      id-token: write
      attestations: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            runner: windows-latest
            rid: win-x64
            exe: jwtdecode.exe
          - label: windows-arm64
            runner: windows-11-arm
            rid: win-arm64
            exe: jwtdecode.exe
          - label: linux-x64
            runner: ubuntu-latest
            rid: linux-x64
            exe: jwtdecode
          - label: linux-arm64
            runner: ubuntu-24.04-arm
            rid: linux-arm64
            exe: jwtdecode
          - label: macos-arm64
            runner: macos-latest
            rid: osx-arm64
            exe: jwtdecode

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Linux AOT dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      - name: Restore
        shell: pwsh
        run: dotnet restore "$env:PROJECT_CLI" -r ${{ matrix.rid }}

      - name: Publish (Native AOT)
        shell: pwsh
        run: >
          dotnet publish "$env:PROJECT_CLI"
          -c Release
          -r ${{ matrix.rid }}
          --no-restore

      - name: Locate published binary
        id: locate
        shell: pwsh
        run: |
          $publishDir = "src/JwtDecoder/bin/Release/net10.0/${{ matrix.rid }}/publish"
          $bin = Join-Path $publishDir '${{ matrix.exe }}'
          if (-not (Test-Path $bin)) {
            Write-Error "Expected output not found: $bin"
            if (Test-Path $publishDir) { Get-ChildItem -Recurse $publishDir | Format-Table FullName, Length }
            exit 1
          }
          if ($IsLinux -or $IsMacOS) { chmod +x $bin }
          $sizeMB = [math]::Round((Get-Item $bin).Length / 1MB, 2)
          Write-Host "Built ${{ matrix.exe }} ($sizeMB MB) for ${{ matrix.rid }}"
          "binPath=$bin" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Functional tests (samples/)
        shell: pwsh
        run: ./tools/Test-AotBuild.ps1 -BinPath "${{ steps.locate.outputs.binPath }}"

      - name: Rename to release-friendly asset name
        id: rename
        shell: pwsh
        run: |
          $version  = '${{ needs.prep.outputs.version }}'
          $src      = '${{ steps.locate.outputs.binPath }}'
          $hasExt   = '${{ matrix.exe }}'.EndsWith('.exe')
          $ext      = if ($hasExt) { '.exe' } else { '' }
          $assetName = "jwtdecode-$version-${{ matrix.rid }}$ext"
          $assetPath = Join-Path $env:RUNNER_TEMP $assetName
          Copy-Item -LiteralPath $src -Destination $assetPath -Force
          if ($IsLinux -or $IsMacOS) { chmod +x $assetPath }
          Write-Host "Asset: $assetPath"
          "assetPath=$assetPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "assetName=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      # Attest the renamed (release-ready) binary. The attestation is
      # bound to the file's SHA-256, so it stays valid no matter what
      # the file is renamed to downstream.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.rename.outputs.assetPath }}

      - name: Upload CLI asset
        uses: actions/upload-artifact@v4
        with:
          name: cli-release-${{ matrix.rid }}
          path: ${{ steps.rename.outputs.assetPath }}
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------
  # Job 4: publish the module to PSGallery. Gated by the
  # `powershell-gallery` GitHub Environment (manual approval, tag-only
  # deployment policy, environment secret).
  # ---------------------------------------------------------------------
  publish-module:
    name: Publish module to PowerShell Gallery
    needs: [prep, validate-module]
    runs-on: windows-latest
    environment: powershell-gallery

    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Download staged module
        uses: actions/download-artifact@v4
        with:
          name: publish-stage
          path: ${{ runner.temp }}/stage

      - name: Publish-PSResource (dry-run or live)
        shell: pwsh
        env:
          # Secret is scoped to this environment; no other workflow / job
          # / branch can read it. Never echoed; GitHub also auto-masks it
          # in logs as a defense-in-depth measure.
          PSG_KEY: ${{ secrets.POWERSHELL_GALLERY_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PSG_KEY)) {
            throw "POWERSHELL_GALLERY_API_KEY secret is not set on the 'powershell-gallery' environment."
          }

          $modulePath = Join-Path '${{ runner.temp }}' 'stage' 'JwtDecoder'
          $manifestPath = Join-Path $modulePath 'JwtDecoder.psd1'
          if (-not (Test-Path $manifestPath)) {
            throw "Staged manifest not found at $manifestPath"
          }

          # Diagnostics: print exactly what's about to be published so a
          # future failure log shows the resolved version unambiguously.
          $version = '${{ needs.prep.outputs.version }}'
          $m = Test-ModuleManifest -Path $manifestPath
          $manifestVersion = "$($m.Version)"
          Write-Host "Tag-derived version (from prep)      : '$version'"
          Write-Host "Manifest ModuleVersion (Test-Manifest): '$manifestVersion'"
          Write-Host "ModuleVersion line in staged psd1    :"
          Select-String -Path $manifestPath -Pattern '^\s*ModuleVersion' | ForEach-Object { Write-Host "    $($_.Line)" }

          # Pre-publish sanity: PSGallery accepts only bare numeric NuGet
          # versions. Refuse anything that smells like a v-prefixed tag or
          # has stray whitespace before we even talk to the gallery, so the
          # failure (if any) is local and clearly labelled.
          if ($manifestVersion -match '^[vV]') {
            throw "Pre-publish sanity check: manifest ModuleVersion '$manifestVersion' starts with 'v'. PSGallery would reject this. Check the validate-module job's rewrite step."
          }
          if ($manifestVersion -match '\s') {
            throw "Pre-publish sanity check: manifest ModuleVersion '$manifestVersion' contains whitespace. PSGallery would reject this."
          }
          if ($manifestVersion -ne $version) {
            throw "Pre-publish sanity check: manifest version '$manifestVersion' does not equal tag-derived version '$version'."
          }

          if ('${{ inputs.dry_run }}' -eq 'true') {
            Write-Host "DRY RUN: invoking Publish-PSResource -WhatIf (no upload)."
            Publish-PSResource -Path $modulePath -Repository PSGallery -ApiKey $env:PSG_KEY -WhatIf -Verbose
            Write-Host ""
            Write-Host "Dry run complete. Re-run this workflow with dry_run=false to publish version $version."
          } else {
            Publish-PSResource -Path $modulePath -Repository PSGallery -ApiKey $env:PSG_KEY -Verbose
            Write-Host ""
            Write-Host "Published JwtDecoder $version"
            Write-Host "URL: https://www.powershellgallery.com/packages/JwtDecoder/$version"
          }

      # Attest the published-to-PSGallery bits. Skipped on dry runs so
      # the attestation log only contains real releases.
      - name: Attest build provenance
        if: ${{ success() && !inputs.dry_run }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            ${{ runner.temp }}/stage/JwtDecoder/JwtDecoder.psd1
            ${{ runner.temp }}/stage/JwtDecoder/JwtDecoder.PowerShell.dll
            ${{ runner.temp }}/stage/JwtDecoder/JwtDecoder.Core.dll

  # ---------------------------------------------------------------------
  # Job 5: cut the GitHub Release at the tag with every CLI binary
  # attached. Skipped entirely on dry runs. Idempotent: if the release
  # already exists (re-run after partial failure), the assets are
  # uploaded with --clobber instead of creating a duplicate release.
  # ---------------------------------------------------------------------
  create-release:
    name: Create GitHub Release with CLI assets
    needs: [prep, build-cli, publish-module]
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Reject non-tag refs (defensive)
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" != "tag" ]; then
            echo "::error::create-release can only run on a tag ref."
            exit 1
          fi

      - name: Download all CLI release binaries
        uses: actions/download-artifact@v4
        with:
          pattern: cli-release-*
          path: ./assets
          merge-multiple: true

      - name: List downloaded assets
        shell: bash
        run: ls -la ./assets/

      - name: Create or update GitHub Release with assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO:  ${{ github.repository }}
        shell: bash
        run: |
          tag='${{ github.ref_name }}'
          version='${{ needs.prep.outputs.version }}'

          if gh release view "$tag" >/dev/null 2>&1; then
            echo "Release $tag already exists; uploading assets with --clobber."
            gh release upload "$tag" ./assets/* --clobber
          else
            echo "Creating release $tag."
            gh release create "$tag" \
              --title  "JwtDecoder $version" \
              --generate-notes \
              --verify-tag \
              ./assets/*
          fi

          echo ""
          echo "Release URL: $(gh release view "$tag" --json url --jq .url)"
